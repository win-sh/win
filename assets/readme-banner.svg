<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">win.sh business loops for AI agents</title>
  <desc id="desc">A visual flow from business signals to scoped agent runs, proof, outcomes, and adaptive scheduling.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071014"/>
      <stop offset="0.48" stop-color="#101820"/>
      <stop offset="1" stop-color="#16120F"/>
    </linearGradient>
    <linearGradient id="accent" x1="138" y1="64" x2="598" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38E6A6"/>
      <stop offset="0.52" stop-color="#54B7FF"/>
      <stop offset="1" stop-color="#F2B84B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1L8 5L1 9" stroke="#7DD3FC" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>
  <path d="M0 286C122 234 252 240 390 282C554 332 692 332 838 272C1013 199 1123 196 1280 252V360H0V286Z" fill="#0E2A2B" opacity="0.55"/>
  <path d="M867 42C1015 21 1143 56 1280 122V0H805C812 27 835 47 867 42Z" fill="#26351E" opacity="0.7"/>

  <g opacity="0.18">
    <path d="M88 68H390" stroke="#FFFFFF"/>
    <path d="M88 116H506" stroke="#FFFFFF"/>
    <path d="M88 164H426" stroke="#FFFFFF"/>
    <path d="M88 212H482" stroke="#FFFFFF"/>
    <path d="M88 260H358" stroke="#FFFFFF"/>
  </g>

  <g transform="translate(76 62)">
    <rect x="0" y="0" width="508" height="236" rx="22" fill="#0B1117" stroke="#263846" filter="url(#softShadow)"/>
    <rect x="26" y="26" width="82" height="34" rx="17" fill="url(#accent)"/>
    <text x="40" y="49" fill="#071014" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800">win.sh</text>
    <text x="26" y="104" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800">Business loops</text>
    <text x="26" y="150" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42" font-weight="800">for AI agents</text>
    <text x="28" y="192" fill="#B9C8D6" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="500">Signals -> briefs -> agent work -> proof -> outcomes</text>
  </g>

  <g transform="translate(620 70)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <g filter="url(#softShadow)">
      <rect x="0" y="0" width="158" height="74" rx="18" fill="#0C141B" stroke="#2A4454"/>
      <circle cx="30" cy="37" r="13" fill="#38E6A6"/>
      <text x="54" y="33" fill="#F8FAFC" font-size="17" font-weight="750">Watch</text>
      <text x="54" y="54" fill="#93A8B8" font-size="12">logs, GSC, feedback</text>
    </g>
    <path d="M166 37H208" stroke="#7DD3FC" stroke-width="2" marker-end="url(#arrow)"/>
    <g filter="url(#softShadow)" transform="translate(218 0)">
      <rect x="0" y="0" width="158" height="74" rx="18" fill="#0C141B" stroke="#2A4454"/>
      <circle cx="30" cy="37" r="13" fill="#54B7FF"/>
      <text x="54" y="33" fill="#F8FAFC" font-size="17" font-weight="750">Brief</text>
      <text x="54" y="54" fill="#93A8B8" font-size="12">scoped run plan</text>
    </g>
    <path d="M384 37H426" stroke="#7DD3FC" stroke-width="2" marker-end="url(#arrow)"/>
    <g filter="url(#softShadow)" transform="translate(436 0)">
      <rect x="0" y="0" width="158" height="74" rx="18" fill="#0C141B" stroke="#2A4454"/>
      <circle cx="30" cy="37" r="13" fill="#F2B84B"/>
      <text x="54" y="33" fill="#F8FAFC" font-size="17" font-weight="750">Execute</text>
      <text x="54" y="54" fill="#93A8B8" font-size="12">Codex or Claude</text>
    </g>
