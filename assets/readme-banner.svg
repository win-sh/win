  <g transform="translate(700 190)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="0" y="0" width="146" height="50" rx="14" fill="#172019" stroke="#365846"/>
    <text x="20" y="31" fill="#BFFFE4" font-size="16" font-weight="700">bug autofix</text>
    <rect x="164" y="0" width="136" height="50" rx="14" fill="#13202A" stroke="#315270"/>
    <text x="188" y="31" fill="#C8ECFF" font-size="16" font-weight="700">SEO growth</text>
    <rect x="318" y="0" width="162" height="50" rx="14" fill="#251E13" stroke="#654B22"/>
    <text x="340" y="31" fill="#FFE2A6" font-size="16" font-weight="700">feedback to fix</text>
  </g>

  <g transform="translate(650 272)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="0" y="0" fill="#E5EEF6" font-size="18" font-weight="750">Adaptive schedule</text>
    <text x="188" y="0" fill="#7C93A5" font-size="18">|</text>
    <text x="216" y="0" fill="#E5EEF6" font-size="18" font-weight="750">Append-only journal</text>
    <text x="420" y="0" fill="#7C93A5" font-size="18">|</text>
    <text x="448" y="0" fill="#E5EEF6" font-size="18" font-weight="750">Human approvals</text>
